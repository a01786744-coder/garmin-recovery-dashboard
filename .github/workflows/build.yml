name: build

# Builds the Windows (.exe) and macOS (.dmg) installers in the cloud so a Mac
# build can be produced without a Mac. On a version tag (vX.Y.Z) the artifacts
# are attached to a GitHub Release for friends to download.
on:
  push:
    branches: [main, build-dashboard]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to create/upload the GitHub Release on tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            ext: exe
          - os: macos-latest # Apple Silicon (arm64) runner
            platform: mac
            ext: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python build deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Run backend tests
        run: python -m pytest backend -q

      - name: Install Node deps (root + frontend)
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Build installer (${{ matrix.platform }})
        run: npm run dist:${{ matrix.platform }}
        env:
          # Unsigned build: don't let electron-builder fail looking for a cert.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: release/*.${{ matrix.ext }}
          if-no-files-found: error

      - name: Publish to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: first matrix job creates the release, the other reuses it.
          # Retried: a transient GitHub API failure (v4.2.0 hit a 503 here) must
          # not ship a release missing one platform's installer.
          for i in 1 2 3 4 5; do
            gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 && break
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --verify-tag && break
            echo "release create attempt $i failed; retrying in 20s"; sleep 20
          done
          for i in 1 2 3 4 5; do
            gh release upload "$GITHUB_REF_NAME" release/*.${{ matrix.ext }} --clobber && break
            [ "$i" = 5 ] && { echo "upload failed after 5 attempts"; exit 1; }
            echo "upload attempt $i failed; retrying in 20s"; sleep 20
          done

      # Prepend macOS Gatekeeper-bypass instructions to the release notes, using
      # the ACTUAL built .dmg name (so the filename is always correct — no manual
      # step per release). Runs only on the mac job, after the release exists.
      - name: Add macOS install instructions to the release
        if: matrix.platform == 'mac' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="$GITHUB_REF_NAME"
          DMG=$(basename "$(ls release/*.dmg | head -n1)")
          BODY=$(gh release view "$TAG" --json body -q .body)
          case "$BODY" in
            *"macOS install (Apple Silicon)"*)
              echo "macOS section already present; skipping."; exit 0 ;;
          esac
          {
            echo "## 🍎 macOS install (Apple Silicon)"
            echo
            echo "The Mac build is **unsigned**, so macOS Gatekeeper blocks it on first launch"
            echo "(it may say the app is \"damaged\" or \"cannot be checked for malicious software\")."
            echo "This is expected for an open-source app — it is safe to run."
            echo
            echo "1. Download **\`$DMG\`** from the Assets below."
            echo "2. Open it and drag the app onto **Applications**."
            echo "3. Run this once in **Terminal** to clear the Gatekeeper flag:"
            echo
            echo '   ```bash'
            echo '   xattr -dr com.apple.quarantine "/Applications/Garmin Recovery Dashboard.app"'
            echo '   ```'
            echo
            echo "4. Open the app normally."
            echo
            echo "Prefer not to use Terminal, or want every error message explained? See the"
            echo "**[full macOS install guide](https://github.com/${GITHUB_REPOSITORY}/blob/${TAG}/docs/MAC-INSTALL.md)**."
            echo
            echo "---"
            echo
            printf '%s\n' "$BODY"
          } > release-notes.md
          for i in 1 2 3 4 5; do
            gh release edit "$TAG" --notes-file release-notes.md && break
            [ "$i" = 5 ] && { echo "notes update failed after 5 attempts"; exit 1; }
            echo "notes update attempt $i failed; retrying in 15s"; sleep 15
          done
